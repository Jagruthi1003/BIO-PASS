version: '3.8'

services:
  zk-auth-server:
    build: .
    container_name: zk-face-auth
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./zk_circuits:/app/zk_circuits
      - ./vkey.json:/app/vkey.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
